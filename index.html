*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,"Apple SD Gothic Neo",sans-serif;background:radial-gradient(circle at top left,#fff0d4,transparent 36%),var(--bg);color:var(--text)}button{font:inherit;border:0;border-radius:14px;padding:12px 14px;background:#f4f0ea;color:var(--text);font-weight:900;cursor:pointer;text-align:left}button.done{background:var(--green);color:white}button.missed{background:var(--red2);color:var(--red)}button:disabled{opacity:.45;cursor:not-allowed}.app{width:min(980px,100%);margin:0 auto;padding:28px 16px 60px}.hero{padding:22px 0 18px;text-align:center}h1{margin:8px auto 16px;font-size:clamp(34px,7vw,60px);line-height:1.08;letter-spacing:-.04em;font-weight:950}.date-controls{display:inline-flex;align-items:center;justify-content:center;gap:8px}.date-nav{width:38px;height:38px;display:grid;place-items:center;padding:0;border-radius:999px;background:#f4f0ea;color:var(--text);text-align:center}.date-picker{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:999px;padding:8px 12px;box-shadow:var(--shadow);color:var(--muted);font-weight:900}.date-picker input{border:0;background:transparent;color:var(--text);font-weight:900;font-size:15px;outline:0}.card,.time-card,.mini-day,.panel{background:rgba(255,255,255,.92);border:1px solid var(--line);box-shadow:var(--shadow)}.card{border-radius:24px;padding:18px}.top-row{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center}.date-heading{position:relative;display:flex;align-items:center;justify-content:center;gap:10px}.date-title-btn{margin:0;padding:0;background:transparent;color:var(--text);box-shadow:none;border-radius:10px;text-align:center}.date-title-btn:hover{background:#f4f0ea}.date-title-btn span{display:block;font-size:28px;letter-spacing:-.02em;font-weight:950}.hidden-date-input{position:absolute;z-index:5;left:50%;top:50%;transform:translate(-50%,-50%);opacity:0;cursor:pointer;width:220px;height:44px;border:0;padding:0}.date-heading .date-nav{box-shadow:none}h2{margin:0 0 8px;font-size:28px;letter-spacing:-.02em}.muted{color:var(--muted)}.progress-box{width:min(380px,100%);max-width:380px}.progress-row{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;font-weight:900;margin-bottom:7px}.progress-track{height:10px;background:#f2ebe3;border-radius:999px;overflow:hidden}.progress-fill{width:0%;height:100%;background:var(--green);border-radius:999px;transition:width .2s}.time-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:18px}.time-card{border-radius:20px;padding:16px}.time-card.complete{background:linear-gradient(135deg,var(--green2),#fff);border-color:#bfe8cf}.time-card h3{display:flex;align-items:center;gap:8px;margin:0 0 14px;font-size:21px;text-align:left}.time-card .hint{font-size:13px;color:var(--muted);margin-bottom:12px}.pill-list{display:grid;gap:8px}.med-btn{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%}.med-left{display:flex;align-items:center;gap:9px}.med-icon{width:30px;height:30px;display:grid;place-items:center;border-radius:10px;background:white;box-shadow:0 3px 10px rgba(0,0,0,.05)}.check{font-size:13px;font-weight:950;opacity:.9}.section{margin-top:28px}.week-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:9px;margin-top:12px}.mini-day{border-radius:16px;padding:10px 8px;min-height:116px}.mini-day.today{outline:3px solid var(--purple2);border-color:var(--purple)}.dow{text-align:center;font-size:12px;color:var(--muted)}.date{text-align:center;font-weight:950;margin:3px 0 8px}.mini-slots{display:grid;gap:5px}.mini-slot{display:flex;justify-content:space-between;gap:5px;font-size:11px;color:var(--muted)}.dots{display:flex;gap:3px}.dot{width:17px;height:17px;display:grid;place-items:center;border-radius:50%;background:#f1ebe4;color:var(--muted);font-size:11px;font-weight:950}.dot.done{background:var(--green);color:white}.dot.missed{background:var(--red);color:white}.dot.locked{opacity:.35}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.stats .card{padding:14px 16px}.stats .stat{text-align:center}.stat .big{display:block;font-size:26px;font-weight:950;margin-top:4px}.tabs{margin-top:28px}.tab-buttons{display:flex;gap:6px;flex-wrap:wrap}.tab-btn{background:#f4f0ea;color:var(--text)}.tab-btn.active{background:var(--purple);color:white}.panel{display:none;border-radius:18px;padding:16px;margin-top:10px}.panel.active{display:block}.history-list{display:grid;gap:8px}.history-item{display:flex;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:12px;padding:10px;background:#fffdf9;font-size:14px}.backup-box{width:100%;min-height:130px;border:1px solid var(--line);border-radius:12px;padding:10px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;transition:all .18s;background:#211f1c;color:white;border-radius:999px;padding:10px 14px;font-weight:900;box-shadow:var(--shadow)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.footer{margin-top:30px;padding-top:14px;border-top:1px solid var(--line);color:var(--muted);font-size:13px}@media(max-width:860px){.time-grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.week-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.progress-box{max-width:none;min-width:100%}}

<div class="app">
  <header class="hero">
    <h1><strong>민둥이 복약 체크리스트</strong></h1>
  </header>

  <section class="card">
    <div class="top-row"><div><div class="date-heading"><button class="date-nav" id="prevDate" type="button">&lt;</button><button class="date-title-btn" id="dateTitleBtn" type="button"><span id="mainTitle">오늘</span></button><button class="date-nav" id="nextDate" type="button">&gt;</button><input type="date" id="selectedDate" class="hidden-date-input" /></div><p class="muted" id="subtitle">시간대별 버튼을 눌러 완료 처리하세요.</p></div><div class="progress-box"><div class="progress-row"><span>오늘 완료율</span><span id="progressText">0%</span></div><div class="progress-track"><div class="progress-fill" id="progressFill"></div></div></div></div>
    <div class="time-grid" id="timeGrid"></div>
  </section>

  <section class="section stats"><article class="card stat"><span>🔥 오늘 남은 항목</span><span class="big" id="leftCount">0개</span><p class="muted">아직 누르지 않은 버튼</p></article><article class="card stat"><span>✅ 총 완료</span><span class="big" id="totalDone">0회</span><p class="muted">저장된 전체 완료 횟수</p></article></section>
</div>
<div class="toast" id="toast">저장했습니다.</div>
<script>
(function(){
  const STORAGE_KEY='dog-med-time-tracker-v1';
  const START_DATE='2026-06-17';
  const OINTMENT_ANCHOR='2026-06-17';
  const timeSlots=[
    {id:'morning',icon:'🌤️',label:'아침',hint:'식후 체크',items:[{id:'earMed_morning',icon:'💊',name:'귀 염증약 (식후)',start:'2026-06-18'},{id:'eyeDrop_morning',icon:'👁️',name:'점안액',start:'2026-06-18'}]},
    {id:'lunch',icon:'☀️',label:'점심',hint:'점심 체크',items:[{id:'eyeDrop_lunch',icon:'👁️',name:'점안액',start:'2026-06-17'},{id:'ointment_lunch',icon:'🧴',name:'귀 연고',start:'2026-06-17',everyOtherDay:true}]},
    {id:'evening',icon:'🌙',label:'저녁',hint:'저녁 체크',items:[{id:'heart_evening',icon:'❤️',name:'심장영양제 (식사와 함께)',start:'2026-06-17'},{id:'earMed_evening',icon:'💊',name:'귀 염증약 (식후)',start:'2026-06-17'},{id:'eyeDrop_evening',icon:'👁️',name:'점안액',start:'2026-06-17'}]}
  ];
  const defaultState={records:{'2026-06-17':{eyeDrop_lunch:{done:true,time:'낮'},ointment_lunch:{done:true,time:'낮'}}},history:[{date:'2026-06-17',label:'점심 · 점안액',done:true,time:'낮'},{date:'2026-06-17',label:'점심 · 귀 연고',done:true,time:'낮'}]};
  const $=id=>document.getElementById(id);const pad=n=>String(n).padStart(2,'0');const keyOf=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());const parseKey=k=>{const [y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d)};const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x};const diffDays=(a,b)=>Math.floor((parseKey(a)-parseKey(b))/86400000);const actualToday=new Date();const actualTodayKey=keyOf(actualToday);let selectedDate=parseKey(actualTodayKey);let selectedKey=actualTodayKey;const timeNow=()=>new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});const dateText=d=>d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'});const dayText=d=>d.toLocaleDateString('ko-KR',{weekday:'short'});
  let state=load();
  function load(){try{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');return {records:{...defaultState.records,...(saved.records||{})},history:saved.history||defaultState.history}}catch(e){return JSON.parse(JSON.stringify(defaultState))}}
  function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}function ensureDay(k){if(!state.records[k])state.records[k]={};return state.records[k]}function isDue(item,key){if(key<START_DATE)return false;if(item.start&&key<item.start)return false;if(item.everyOtherDay)return diffDays(key,OINTMENT_ANCHOR)>=0&&diffDays(key,OINTMENT_ANCHOR)%2===0;return true}function cutoff(slot){const h=new Date().getHours();if(slot==='morning')return h>=14;if(slot==='lunch')return h>=20;return h>=23}function statusFor(item,slot,key){const rec=state.records[key]&&state.records[key][item.id];if(!isDue(item,key))return 'locked';if(rec&&rec.done)return 'done';if(key<actualTodayKey)return 'missed';if(key>actualTodayKey)return 'pending';return cutoff(slot)?'missed':'pending'}function todayTasks(){return timeSlots.flatMap(s=>s.items.map(i=>({slot:s,item:i,status:statusFor(i,s.id,selectedKey)}))).filter(t=>t.status!=='locked')}function toast(msg){const el=$('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500)}
  function render(){$('selectedDate').value=selectedKey;$('mainTitle').textContent=dateText(selectedDate);renderTimes();renderStats()}
  function renderTimes(){const grid=$('timeGrid');grid.innerHTML='';const day=ensureDay(selectedKey);const tasks=todayTasks();const done=tasks.filter(t=>t.status==='done').length;const pct=tasks.length?Math.round(done/tasks.length*100):0;$('progressText').textContent=pct+'%';$('progressFill').style.width=pct+'%';timeSlots.forEach(slot=>{const available=slot.items.filter(item=>statusFor(item,slot.id,selectedKey)!=='locked');const complete=available.length&&available.every(item=>statusFor(item,slot.id,selectedKey)==='done');const card=document.createElement('article');card.className='time-card '+(complete?'complete':'');const buttons=slot.items.map(item=>{const st=statusFor(item,slot.id,selectedKey);const rec=day[item.id]||{};const mark={done:'✓ 완료',pending:'○ 미체크',missed:'! 확인',locked:'– 해당 없음'}[st];return `<button class="med-btn ${st}" data-action="toggle" data-key="${item.id}" data-label="${slot.label} · ${item.name}" ${st==='locked'?'disabled':''}><span class="med-left"><span class="med-icon">${item.icon}</span><span>${item.name}</span></span><span class="check">${rec.time?rec.time+' · ':''}${mark}</span></button>`}).join('');card.innerHTML=`<h3>${slot.icon} ${slot.label}</h3><div class="pill-list">${buttons}</div>`;grid.appendChild(card)})}
  function renderWeek(){const grid=$('weekGrid');grid.innerHTML='';for(let i=-3;i<=3;i++){const d=addDays(selectedDate,i),key=keyOf(d);const el=document.createElement('div');el.className='mini-day'+(key===selectedKey?' today':'');const rows=timeSlots.map(slot=>{const dots=slot.items.map(item=>{const st=statusFor(item,slot.id,key);const mark={done:'✓',missed:'!',pending:'○',locked:'–'}[st];return `<span class="dot ${st}" title="${slot.label} ${item.name}">${mark}</span>`}).join('');return `<div class="mini-slot"><span>${slot.icon} ${slot.label}</span><span class="dots">${dots}</span></div>`}).join('');el.innerHTML=`<div class="dow">${dayText(d)}</div><div class="date">${d.getMonth()+1}/${d.getDate()}</div><div class="mini-slots">${rows}</div>`;grid.appendChild(el)}}
  function renderStats(){const tasks=todayTasks();$('leftCount').textContent=tasks.filter(t=>t.status!=='done').length+'개';let total=0;Object.values(state.records).forEach(day=>Object.values(day).forEach(r=>{if(r.done)total++}));$('totalDone').textContent=total+'회'}
  document.addEventListener('click',e=>{const btn=e.target.closest('button');if(!btn)return;if(btn.dataset.tab){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));btn.classList.add('active');$(btn.dataset.tab+'Panel').classList.add('active');return}if(btn.dataset.action==='toggle'){const day=ensureDay(selectedKey);const key=btn.dataset.key;const rec=day[key]||{};rec.done=!rec.done;rec.time=rec.done?timeNow():'';day[key]=rec;state.history.unshift({date:selectedKey,label:btn.dataset.label,done:rec.done,time:timeNow()});state.history=state.history.slice(0,100);save();render();toast(rec.done?'완료 체크했습니다.':'체크를 취소했습니다.')}});
  $('selectedDate').addEventListener('change',()=>{selectedDate=parseKey($('selectedDate').value);selectedKey=keyOf(selectedDate);render()});
  $('prevDate').addEventListener('click',()=>{selectedDate=addDays(selectedDate,-1);selectedKey=keyOf(selectedDate);render()});
  $('nextDate').addEventListener('click',()=>{selectedDate=addDays(selectedDate,1);selectedKey=keyOf(selectedDate);render()});
  render();
})();
</script>
